<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Акції Провайдера</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.date{
    color:red;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>🔥 Актуальні акції</h1>

<div class="card">
    <h2>Підключення за 1 грн</h2>
    <p class="date">До 31.07.2026</p>
    <p>Для нових абонентів.</p>
</div>

<div class="card">
    <h2>Перший місяць безкоштовно</h2>
    <p class="date">До 31.07.2026</p>
    <p>При підключенні тарифів від 300 грн.</p>
</div>

</body>
</html>
